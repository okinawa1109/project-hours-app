version: "3.9"

services:
  frontend:
    image: node:20
    working_dir: /workspace/frontend
    volumes:
      - .:/workspace
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend

  backend:
    image: node:20
    working_dir: /workspace/backend
    volumes:
      - .:/workspace
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: projecthours
    command: sh -c "npm install && npm run dev"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: projecthours
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: